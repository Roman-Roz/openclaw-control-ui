<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <path d="M50,20 
           C30,20 20,40 20,60 
           C20,80 40,90 50,90 
           C60,90 80,80 80,60 
           C80,40 70,20 50,20 
           Z
           M35,40 
           C30,45 30,55 35,60 
           C40,65 45,65 50,60 
           C55,65 60,65 65,60 
           C70,55 70,45 65,40 
           C60,35 55,35 50,40 
           C45,35 40,35 35,40 
           Z" 
        fill="url(#neonGradient)" 
        filter="url(#glow)" 
        stroke="#ffffff" 
        stroke-width="1" />
  
  <!-- Точки для пальцев -->
  <circle cx="30" cy="50" r="5" fill="#00f3ff" filter="url(#glow)" />
  <circle cx="50" cy="45" r="5" fill="#9d00ff" filter="url(#glow)" />
  <circle cx="70" cy="50" r="5" fill="#ff00ff" filter="url(#glow)" />
</svg>